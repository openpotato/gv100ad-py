pool:
  vmImage: 'windows-latest'

variables:
- group: 'pypi-package-config'
- group: 'github-config'

stages:

- stage: Test  
  jobs:
  - job: 
    strategy:
      matrix:
        Python39:
          python.version: '3.9'
        Python312:
          python.version: '3.12'
        Python314:
          python.version: '3.14'
    steps:
    - checkout: self
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(python.version)'
    - task: PowerShell@2
      displayName: 'Install dependencies'
      inputs:
        targetType: 'inline'
        script: |
          python -m pip install --upgrade pip
          pip install pytest pytest-azurepipelines
          pip install -e .
        pwsh: true
    - task: PowerShell@2
      displayName: 'PyTest'
      inputs:
        targetType: 'inline'
        script: |
          python -m pytest tests/
        pwsh: true

- stage: Deploy  
  dependsOn: Test
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: 
    steps:
    - checkout: self
      fetchDepth: 0
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.x'
    - task: PowerShell@2
      displayName: 'Install dependencies'
      inputs:
        targetType: 'inline'
        script: |
          pip install -U setuptools wheel twine build  
        pwsh: true
    - task: PowerShell@2
      displayName: 'Packaging'
      inputs:
        targetType: 'inline'
        script: |
          python -m build --sdist
          python -m build --wheel
        pwsh: true
    - task: PowerShell@2
      displayName: 'Push to GitHub'
      inputs:
        targetType: inline
        pwsh: true
        script: |

          $ErrorActionPreference = 'Stop'

          try {
            
            # Configure Git identity
            git config user.name  'azure-devops-bot'
            git config user.email 'azuredevops@stueber.nomail'

            # Add 'github' remote
            git remote add github "https://$($env:PAT)@github.com/openpotato/gv100ad-py.git"

            # Fetch remote main if it exists (ok to fail if repo is empty)
            git fetch --prune github main
            $fetchCode = $LASTEXITCODE

            # If remote branch exists, only push when remote is an ancestor of HEAD (fast-forward safe)
            if ($fetchCode -eq 0) {
              git merge-base --is-ancestor github/main HEAD
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Remote has commits not in local (or histories diverged). Aborting push."
              }
            }

            # Push only the main branch (fast-forward or create remote if missing)
            git push --tags github HEAD:refs/heads/main
            if ($LASTEXITCODE -ne 0) { throw "git push failed with exit code $LASTEXITCODE" }
            
          }
          finally {
            
            # Remove the remote so the PAT isn't left in .git/config
            git remote remove github 2>$null | Out-Null
            
          }
      env:
        PAT: $(PAT)
    - task: PowerShell@2
      displayName: 'Upload'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
      inputs:
        targetType: 'inline'
        script: |
          twine upload dist/* -u $(USERNAME) -p $(PASSWORD)
        pwsh: true
